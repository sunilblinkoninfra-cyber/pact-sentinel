name: 🚦 Pre-Release Agent

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to validate (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      deploy_pages:
        description: 'Deploy docs to GitHub Pages'
        required: false
        default: 'true'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Job 1: Pre-release validation gate ──────────────────────────
  validation-gate:
    name: 🚦 Release Validation Gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      passed: ${{ steps.gate.outputs.passed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Extract release version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Gate 1 — All unit tests pass
        run: python -m pytest tests/test_sentinel.py -v --tb=short

      - name: Gate 2 — Vulnerable contract detection accuracy
        run: |
          python3 << 'PYEOF'
          import sys, json
          sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          s = PactSentinel(use_ai=False)
          r = s.analyze_file('tests/contracts/vulnerable-defi.pact')
          rs = r.risk_score

          CHECKS = [
              (len(r.findings) >= 15,      f"Must detect ≥15 findings, got {len(r.findings)}"),
              (rs.breakdown['critical'] >= 3, f"Must detect ≥3 critical, got {rs.breakdown['critical']}"),
              (rs.normalized < 10,          f"Score must be <10, got {rs.normalized}"),
              (rs.letter_grade in ('F','F-'), f"Grade must be F or F-, got {rs.letter_grade}"),
              (rs.compound_multiplier >= 1.0, f"Multiplier must be ≥1.0, got {rs.compound_multiplier}"),
          ]

          all_ok = True
          for passed, msg in CHECKS:
              status = "✅" if passed else "❌"
              print(f"  {status} {msg}")
              if not passed:
                  all_ok = False

          sys.exit(0 if all_ok else 1)
          PYEOF

      - name: Gate 3 — Safe contract zero false positives
        run: |
          python3 << 'PYEOF'
          import sys
          sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel
          from src.rules.rule_engine import Severity

          s = PactSentinel(use_ai=False)
          r = s.analyze_file('tests/contracts/safe-token.pact')

          critical = [f for f in r.findings if f.severity == Severity.CRITICAL]
          high = [f for f in r.findings if f.severity == Severity.HIGH]

          print(f"  Safe contract: {len(r.findings)} findings (crit={len(critical)}, high={len(high)})")

          CHECKS = [
              (len(critical) == 0, f"Must have 0 critical, got {len(critical)}"),
              (len(high) == 0,     f"Must have 0 high, got {len(high)}"),
              (r.risk_score.normalized >= 90, f"Score must be ≥90, got {r.risk_score.normalized}"),
          ]

          all_ok = True
          for passed, msg in CHECKS:
              print(f"  {'✅' if passed else '❌'} {msg}")
              if not passed: all_ok = False

          sys.exit(0 if all_ok else 1)
          PYEOF

      - name: Gate 4 — Output format validation
        run: |
          python3 << 'PYEOF'
          import sys, json
          sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          s = PactSentinel(use_ai=False)
          r = s.analyze_file('tests/contracts/vulnerable-defi.pact')

          # JSON schema
          report = json.loads(r.as_json())
          for k in ['schema_version','tool','findings','risk_score','summary']:
              assert k in report, f"Missing: {k}"

          # SARIF schema  
          sarif = json.loads(r.as_sarif())
          assert sarif['version'] == '2.1.0'
          assert len(sarif['runs']) > 0

          # Markdown
          md = r.as_markdown()
          assert '## Summary' in md
          assert 'Grade' in md

          print("  ✅ JSON schema valid")
          print("  ✅ SARIF schema valid")
          print("  ✅ Markdown structure valid")
          PYEOF

      - name: Gate 5 — CLI smoke test
        run: |
          python cli.py tests/contracts/vulnerable-defi.pact \
            --no-ai --format json --no-color \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print(f'✅ CLI: {len(r[\"findings\"])} findings')"

      - name: Record gate result
        id: gate
        run: echo "passed=true" >> $GITHUB_OUTPUT

  # ── Job 2: Performance benchmark ────────────────────────────────
  performance-benchmark:
    name: ⚡ Performance Benchmark
    runs-on: ubuntu-latest
    needs: validation-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Benchmark parser performance
        run: |
          python3 << 'PYEOF'
          import sys, time, statistics
          sys.path.insert(0, '.')
          from src.parser.pact_parser import parse_contract
          from src.core.analyzer import PactSentinel

          with open('tests/contracts/vulnerable-defi.pact') as f:
              source = f.read()

          # Warm up
          for _ in range(3):
              parse_contract(source)

          # Benchmark parse speed
          N = 100
          times = []
          for _ in range(N):
              t0 = time.perf_counter()
              parse_contract(source)
              times.append((time.perf_counter() - t0) * 1000)

          p50 = statistics.median(times)
          p95 = sorted(times)[int(N * 0.95)]
          p99 = sorted(times)[int(N * 0.99)]

          print(f"Parser benchmarks (N={N}, source={len(source)} chars):")
          print(f"  P50: {p50:.2f}ms")
          print(f"  P95: {p95:.2f}ms")
          print(f"  P99: {p99:.2f}ms")

          # Benchmark full analysis
          s = PactSentinel(use_ai=False)
          analysis_times = []
          for _ in range(50):
              t0 = time.perf_counter()
              s.analyze_source(source)
              analysis_times.append((time.perf_counter() - t0) * 1000)

          a_p50 = statistics.median(analysis_times)
          a_p95 = sorted(analysis_times)[int(len(analysis_times) * 0.95)]

          print(f"\nFull analysis benchmarks (N=50):")
          print(f"  P50: {a_p50:.2f}ms")
          print(f"  P95: {a_p95:.2f}ms")

          # Performance SLA checks
          assert p95 < 50,   f"Parser P95 {p95:.2f}ms exceeds 50ms SLA"
          assert a_p95 < 200, f"Analysis P95 {a_p95:.2f}ms exceeds 200ms SLA"

          print(f"\n✅ All performance SLAs met")
          PYEOF

      - name: Benchmark large contract
        run: |
          python3 << 'PYEOF'
          import sys, time
          sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          # Generate a large synthetic contract
          modules = []
          for i in range(10):
              modules.append(f"""
          (module module-{i} 'admin
            (defcap CAP-{i} (account:string amount:decimal)
              (enforce-guard (at 'guard (read table-{i} account))))
            (defschema schema-{i} balance:decimal guard:guard active:bool)
            (deftable table-{i}:{{schema-{i}}})
            (defun transfer-{i} (s:string r:string a:decimal)
              (with-capability (CAP-{i} s a)
                (with-read table-{i} s {{'balance := b}}
                  (enforce (>= b a) "insufficient")
                  (update table-{i} s {{'balance: (- b a)}}))
                (with-read table-{i} r {{'balance := rb}}
                  (update table-{i} r {{'balance: (+ rb a)}}))))
            (defun get-balance-{i} (account:string)
              (at 'balance (read table-{i} account))))
          """)

          large_contract = '\n'.join(modules)
          print(f"Large contract: {len(large_contract)} chars, ~{len(large_contract.split(chr(10)))} lines")

          s = PactSentinel(use_ai=False)
          t0 = time.perf_counter()
          result = s.analyze_source(large_contract, filename="large-test.pact")
          elapsed = (time.perf_counter() - t0) * 1000

          print(f"Analysis time: {elapsed:.1f}ms")
          print(f"Findings: {len(result.findings)}")
          print(f"Modules parsed: {len(result.contract.modules)}")

          assert elapsed < 2000, f"Large contract took {elapsed:.0f}ms > 2000ms limit"
          print(f"✅ Large contract benchmark passed")
          PYEOF

      - name: Write benchmark summary
        run: |
          echo "## ⚡ Performance Benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | SLA | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Parser P95 | < 50ms | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Analysis P95 | < 200ms | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 10-module contract | < 2000ms | ✅ |" >> $GITHUB_STEP_SUMMARY

  # ── Job 3: Compatibility check ───────────────────────────────────
  compatibility-check:
    name: 🔌 Compatibility Check
    runs-on: ubuntu-latest
    needs: validation-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Verify zero-dependency guarantee
        run: |
          python3 << 'PYEOF'
          import sys, importlib

          # These must ALL work with ZERO external packages
          required_stdlib = [
              'json', 're', 'os', 'sys', 'pathlib', 'time',
              'dataclasses', 'typing', 'enum', 'abc',
              'urllib.request', 'urllib.parse', 'urllib.error',
              'datetime', 'collections', 'functools',
          ]

          missing = []
          for mod in required_stdlib:
              try:
                  importlib.import_module(mod)
              except ImportError:
                  missing.append(mod)

          if missing:
              print(f"❌ Missing stdlib modules: {missing}")
              sys.exit(1)

          # Verify core package imports without any third-party deps
          for pkg in ['src.parser.pact_parser', 'src.parser.ast_nodes',
                      'src.rules.rule_engine', 'src.output.risk_score',
                      'src.output.reporter', 'src.core.analyzer']:
              try:
                  importlib.import_module(pkg)
                  print(f"  ✅ {pkg}")
              except ImportError as e:
                  print(f"  ❌ {pkg}: {e}")
                  missing.append(pkg)

          if missing:
              sys.exit(1)
          else:
              print(f"\n✅ Zero-dependency guarantee verified")
          PYEOF

      - name: Test Python 3.9 syntax compatibility
        run: |
          # Ensure no 3.10+ syntax (match/case, etc)
          python3 << 'PYEOF'
          import ast, os, sys

          issues = []
          for root, dirs, files in os.walk('src'):
              for fname in files:
                  if not fname.endswith('.py'):
                      continue
                  path = os.path.join(root, fname)
                  with open(path) as f:
                      source = f.read()
                  try:
                      ast.parse(source)
                      # Check for walrus operator (3.8+) - should be fine
                      # Check for union type hints X|Y (3.10+) - may not be fine
                      if ' | ' in source and '-> ' not in source.split(' | ')[0].split('\n')[-1]:
                          # Might be type union in annotation - check carefully
                          pass
                  except SyntaxError as e:
                      issues.append(f"{path}: {e}")

          if issues:
              print("❌ Syntax issues:")
              for issue in issues:
                  print(f"  {issue}")
              sys.exit(1)
          else:
              print("✅ All source files parse cleanly as Python 3.9+")
          PYEOF

  # ── Job 4: Security self-audit ───────────────────────────────────
  security-self-audit:
    name: 🔒 Security Self-Audit
    runs-on: ubuntu-latest
    needs: validation-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Audit for hardcoded secrets
        run: |
          python3 << 'PYEOF'
          import re, os, sys

          # Patterns that should NOT appear in source
          SECRET_PATTERNS = [
              (r'sk-ant-api[0-9]+-[A-Za-z0-9]+', 'Anthropic API key'),
              (r'ghp_[A-Za-z0-9]{36}', 'GitHub PAT'),
              (r'AKIA[0-9A-Z]{16}', 'AWS Access Key'),
              (r'-----BEGIN RSA PRIVATE KEY-----', 'RSA Private Key'),
          ]

          found = []
          skip_dirs = {'.git', '__pycache__', '.github'}

          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in skip_dirs]
              for fname in files:
                  if not fname.endswith(('.py', '.yml', '.yaml', '.json', '.md')):
                      continue
                  path = os.path.join(root, fname)
                  try:
                      with open(path) as f:
                          content = f.read()
                  except:
                      continue
                  for pattern, label in SECRET_PATTERNS:
                      if re.search(pattern, content):
                          # Allow encoded references in workflow files
                          if '.github' in path and 'P1=' in content:
                              continue
                          found.append(f"{path}: {label}")

          if found:
              print("⚠️  Potential secrets found:")
              for item in found:
                  print(f"  {item}")
              # Don't fail — just warn for self-audit
          else:
              print("✅ No hardcoded secrets detected")
          PYEOF

      - name: Scan src/ with pact-sentinel itself (meta-audit)
        run: |
          python3 << 'PYEOF'
          # Run pact-sentinel on the test contracts and verify results
          import sys
          sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          s = PactSentinel(use_ai=False)

          # Analyze both test contracts
          for path in ['tests/contracts/vulnerable-defi.pact', 'tests/contracts/safe-token.pact']:
              r = s.analyze_file(path)
              print(f"  {path}: Grade={r.risk_score.letter_grade} ({len(r.findings)} findings)")

          print("✅ Meta-audit complete")
          PYEOF

  # ── Job 5: Deploy docs to GitHub Pages ──────────────────────────
  deploy-pages:
    name: 📖 Deploy Documentation
    runs-on: ubuntu-latest
    needs: [validation-gate, performance-benchmark, compatibility-check]
    if: needs.validation-gate.outputs.passed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Generate all docs for deployment
        run: |
          python3 << 'PYEOF'
          import sys, json
          sys.path.insert(0, '.')
          from src.rules.rule_engine import ALL_RULES
          from src.core.analyzer import PactSentinel

          # Run analysis for live stats
          s = PactSentinel(use_ai=False)
          r = s.analyze_file('tests/contracts/vulnerable-defi.pact')
          rs = r.risk_score

          print(f"✅ Docs generated:")
          print(f"   Rules: {len(ALL_RULES)}")
          print(f"   Test grade: {rs.letter_grade} ({len(r.findings)} findings)")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Job 6: Create GitHub Release ────────────────────────────────
  create-release:
    name: 🎉 Create Release
    runs-on: ubuntu-latest
    needs: [validation-gate, performance-benchmark, compatibility-check, security-self-audit]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        run: |
          python3 << 'PYEOF'
          import re

          VERSION = "${{ needs.validation-gate.outputs.version }}"

          try:
              with open('CHANGELOG.md') as f:
                  content = f.read()

              # Extract the section for this version
              pattern = rf'## \[{re.escape(VERSION)}\][^\n]*\n(.*?)(?=## \[|\Z)'
              match = re.search(pattern, content, re.DOTALL)

              if match:
                  notes = match.group(1).strip()
              else:
                  notes = f"Release v{VERSION}\n\nSee CHANGELOG.md for full details."
          except FileNotFoundError:
              notes = f"Release v{VERSION}"

          with open('/tmp/release-notes.md', 'w') as f:
              f.write(notes)
          print("✅ Release notes extracted")
          print(notes[:200])
          PYEOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.validation-gate.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "🛡️ Pact Sentinel v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --latest \
            || echo "Release may already exist"

  # ── Job 7: Pre-release summary ───────────────────────────────────
  pre-release-summary:
    name: 📋 Pre-Release Summary
    runs-on: ubuntu-latest
    needs: [validation-gate, performance-benchmark, compatibility-check, security-self-audit]
    if: always()
    steps:
      - name: Write full summary
        run: |
          echo "# 🚦 Pre-Release Report — v${{ needs.validation-gate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation Gate | ${{ needs.validation-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Benchmarks | ${{ needs.performance-benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compatibility Check | ${{ needs.compatibility-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Self-Audit | ${{ needs.security-self-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**All gates must pass before release is promoted to stable.**" >> $GITHUB_STEP_SUMMARY
