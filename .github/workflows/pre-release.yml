name: 🚦 Pre-Release Agent

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Job 1: Validation gate ────────────────────────────────────────
  validation-gate:
    name: 🚦 Validation Gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      passed:  ${{ steps.gate.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install dependencies
        run: pip install pytest

      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Gate 1 — Unit tests
        run: python -m pytest tests/test_sentinel.py -v --tb=short

      - name: Gate 2 — Vulnerable contract detection
        run: |
          python3 << 'PYEOF'
          import sys; sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          s  = PactSentinel(use_ai=False)
          r  = s.analyze_file('tests/contracts/vulnerable-defi.pact')
          rs = r.risk_score
          bd = rs.breakdown

          checks = [
              (len(r.findings) >= 15,        f"findings {len(r.findings)} >= 15"),
              (bd['critical'] >= 3,          f"critical {bd['critical']} >= 3"),
              (rs.normalized < 10,           f"score {rs.normalized} < 10"),
              (rs.letter_grade in ('F','F-'), f"grade {rs.letter_grade} in (F, F-)"),
          ]

          all_ok = True
          for ok, msg in checks:
              print(f"  {'OK' if ok else 'FAIL'} {msg}")
              if not ok: all_ok = False

          sys.exit(0 if all_ok else 1)
          PYEOF

      - name: Gate 3 — Safe contract no false positives
        run: |
          python3 << 'PYEOF'
          import sys; sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          s  = PactSentinel(use_ai=False)
          r  = s.analyze_file('tests/contracts/safe-token.pact')
          rs = r.risk_score

          checks = [
              (rs.breakdown['critical'] == 0, f"critical={rs.breakdown['critical']} == 0"),
              (rs.normalized >= 90,           f"score={rs.normalized} >= 90"),
          ]

          all_ok = True
          for ok, msg in checks:
              print(f"  {'OK' if ok else 'FAIL'} {msg}")
              if not ok: all_ok = False

          sys.exit(0 if all_ok else 1)
          PYEOF

      - name: Gate 4 — Output format schemas
        run: |
          python3 << 'PYEOF'
          import sys, json; sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          s = PactSentinel(use_ai=False)
          r = s.analyze_file('tests/contracts/vulnerable-defi.pact')

          report = json.loads(r.as_json())
          for k in ['schema_version','tool','findings','risk_score','summary']:
              assert k in report, f"JSON missing: {k}"
          print("  OK JSON schema")

          sarif = json.loads(r.as_sarif())
          assert sarif['version'] == '2.1.0'
          assert len(sarif['runs'][0]['results']) > 0
          print("  OK SARIF 2.1.0")

          md = r.as_markdown()
          assert '## Summary' in md and 'Grade' in md
          print("  OK Markdown")
          PYEOF

      - name: Gate 5 — CLI smoke test
        run: |
          python cli.py tests/contracts/vulnerable-defi.pact --no-ai --format json --no-color \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print(f'OK {len(r[\"findings\"])} findings')"
          python cli.py tests/contracts/vulnerable-defi.pact --no-ai --summary

      - name: Record gate passed
        id: gate
        run: echo "passed=true" >> $GITHUB_OUTPUT

  # ── Job 2: Performance benchmarks ────────────────────────────────
  performance-benchmark:
    name: ⚡ Performance
    runs-on: ubuntu-latest
    needs: validation-gate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Benchmark analysis engine
        run: |
          python3 << 'PYEOF'
          import sys, time, statistics; sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          with open('tests/contracts/vulnerable-defi.pact') as f: src = f.read()
          s = PactSentinel(use_ai=False)

          times = []
          for _ in range(200):
              t0 = time.perf_counter()
              s.analyze_source(src)
              times.append((time.perf_counter()-t0)*1000)
          times.sort()
          p50 = times[100]; p95 = times[190]; p99 = times[198]

          print(f"P50={p50:.1f}ms  P95={p95:.1f}ms  P99={p99:.1f}ms  throughput={1000/sum(times)*1000:.0f}/s")
          assert p95 < 200,  f"P95 {p95:.1f}ms > 200ms SLA"
          print("All SLAs met")
          PYEOF

  # ── Job 3: Compatibility check ────────────────────────────────────
  compatibility-check:
    name: 🔌 Compatibility
    runs-on: ubuntu-latest
    needs: validation-gate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Zero-dependency import check
        run: |
          python3 << 'PYEOF'
          import sys; sys.path.insert(0, '.')
          for pkg in ['src.parser.pact_parser', 'src.parser.ast_nodes',
                      'src.rules.rule_engine', 'src.output.risk_score',
                      'src.output.reporter',  'src.core.analyzer']:
              __import__(pkg)
              print(f"  OK {pkg}")
          print("Zero-dependency import: OK")
          PYEOF

      - name: Python syntax check
        run: |
          python3 -c "
          import ast, os, sys
          issues = []
          for root, dirs, files in os.walk('src'):
              for fname in files:
                  if not fname.endswith('.py'): continue
                  path = os.path.join(root, fname)
                  try: ast.parse(open(path).read())
                  except SyntaxError as e: issues.append(f'{path}: {e}')
          if issues: [print(i) for i in issues]; sys.exit(1)
          else: print(f'All source files parse cleanly')
          "

  # ── Job 4: Security self-audit ────────────────────────────────────
  security-self-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: validation-gate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Self-scan with pact-sentinel
        run: |
          python3 << 'PYEOF'
          import sys; sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          s = PactSentinel(use_ai=False)
          for path in ['tests/contracts/vulnerable-defi.pact', 'tests/contracts/safe-token.pact']:
              r = s.analyze_file(path)
              print(f"  {path}: grade={r.risk_score.letter_grade} findings={len(r.findings)}")
          print("Self-audit complete")
          PYEOF

  # ── Job 5: Deploy Pages (only on tag push or explicit dispatch) ────
  deploy-pages:
    name: 📖 Deploy Pages
    runs-on: ubuntu-latest
    needs: [validation-gate, performance-benchmark, compatibility-check]
    if: |
      always() &&
      needs.validation-gate.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
        continue-on-error: true

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

  # ── Job 6: Create release (tags only) ─────────────────────────────
  create-release:
    name: 🎉 Create Release
    runs-on: ubuntu-latest
    needs: [validation-gate, performance-benchmark, compatibility-check]
    if: startsWith(github.ref, 'refs/tags/v')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.validation-gate.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "🛡️ Pact Sentinel v${VERSION}" \
            --notes "Release v${VERSION}. See CHANGELOG.md for details." \
            --latest 2>/dev/null || echo "Release already exists or skipped"

  # ── Job 7: Summary ────────────────────────────────────────────────
  pre-release-summary:
    name: 📋 Pre-Release Summary
    runs-on: ubuntu-latest
    needs: [validation-gate, performance-benchmark, compatibility-check, security-self-audit]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 🚦 Pre-Release Report — v${{ needs.validation-gate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation Gate (5 gates) | ${{ needs.validation-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Benchmarks    | ${{ needs.performance-benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compatibility Check       | ${{ needs.compatibility-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Self-Audit       | ${{ needs.security-self-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All gates must pass before release is promoted to stable." >> $GITHUB_STEP_SUMMARY

      - name: Fail if validation gate failed
        if: needs.validation-gate.result == 'failure'
        run: |
          echo "❌ Validation gate failed — release blocked"
          exit 1
