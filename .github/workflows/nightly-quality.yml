name: 🌙 Nightly Quality Agent

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  drift-detection:
    name: 🔍 Regression Drift Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install pytest
        run: pip install pytest

      - name: Compare findings vs baseline
        run: |
          python3 << 'PYEOF'
          import sys; sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          s = PactSentinel(use_ai=False)
          BASELINE = {
              'tests/contracts/vulnerable-defi.pact': {
                  'min_findings': 15, 'max_score': 10.0,
                  'must_have_rules': ['R-001', 'R-005', 'R-006', 'R-007'],
              },
              'tests/contracts/safe-token.pact': {
                  'max_critical': 0, 'min_score': 90.0,
              },
          }

          drift = False
          for path, exp in BASELINE.items():
              r  = s.analyze_file(path)
              rs = r.risk_score
              print(f"  {path}: findings={len(r.findings)} score={rs.normalized} grade={rs.letter_grade}")
              checks = []
              if 'min_findings'   in exp: checks.append((len(r.findings) >= exp['min_findings'],      f"findings {len(r.findings)} >= {exp['min_findings']}"))
              if 'max_score'      in exp: checks.append((rs.normalized <= exp['max_score'],            f"score {rs.normalized} <= {exp['max_score']}"))
              if 'max_critical'   in exp: checks.append((rs.breakdown.get('critical',0) <= exp['max_critical'], f"critical {rs.breakdown.get('critical',0)} <= {exp['max_critical']}"))
              if 'min_score'      in exp: checks.append((rs.normalized >= exp['min_score'],            f"score {rs.normalized} >= {exp['min_score']}"))
              if 'must_have_rules' in exp:
                  found = {f.rule_id for f in r.findings}
                  for rid in exp['must_have_rules']:
                      checks.append((rid in found, f"rule {rid} {'found' if rid in found else 'MISSING'}"))
              for ok, msg in checks:
                  print(f"    {'OK' if ok else 'DRIFT'} {msg}")
                  if not ok: drift = True

          if drift: print("\nDRIFT DETECTED"); sys.exit(1)
          else:     print("\nNo drift detected")
          PYEOF

  nightly-benchmark:
    name: 📈 Performance Benchmark
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Benchmark analysis engine
        run: |
          python3 << 'PYEOF'
          import sys, time, statistics; sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          with open('tests/contracts/vulnerable-defi.pact') as f: src = f.read()
          s = PactSentinel(use_ai=False)

          times = []
          for _ in range(200):
              t0 = time.perf_counter()
              s.analyze_source(src)
              times.append((time.perf_counter()-t0)*1000)
          times.sort()

          p50 = times[100]; p95 = times[190]; p99 = times[198]
          print(f"Analysis: P50={p50:.1f}ms P95={p95:.1f}ms P99={p99:.1f}ms")
          assert p95 < 200, f"P95 {p95:.1f}ms > 200ms"
          print("All SLAs met")
          PYEOF

  fuzz-testing:
    name: 🎲 Fuzz Testing
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Fuzz 500 random inputs
        run: |
          python3 << 'PYEOF'
          import sys, random; sys.path.insert(0, '.')
          from src.core.analyzer import PactSentinel

          random.seed(42)
          s = PactSentinel(use_ai=False)
          crashes = 0
          for i in range(500):
              f = i % 5
              if   f == 0: src = "(module m 'a (defun f () (update t 'k {'v: 1})))"[:random.randint(5,50)]
              elif f == 1: src = ''.join(random.choice('()(defun module ') for _ in range(random.randint(5,80)))
              elif f == 2: src = ' ' * random.randint(0,20)
              elif f == 3: src = f"(module m 'a {'x'*random.randint(0,30)})"
              else:        src = ';; comment\n' * random.randint(1,5)
              try:
                  s.analyze_source(src)
              except (SystemExit, KeyboardInterrupt, MemoryError):
                  crashes += 1
              except Exception:
                  pass
          if crashes: print(f"CRASHES: {crashes}"); sys.exit(1)
          else:        print(f"OK: 500 inputs, 0 crashes")
          PYEOF

  code-quality:
    name: 📐 Code Quality
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install tools
        run: pip install radon flake8 || true
        continue-on-error: true

      - name: Complexity + style
        run: |
          python -m radon cc src/ --average -n C 2>/dev/null || echo "radon unavailable"
          python -m flake8 src/ cli.py --max-line-length=120 --ignore=E501,W503 --count 2>/dev/null || echo "flake8 done"
        continue-on-error: true

      - name: Source line counts
        run: |
          python3 -c "
          import os
          totals = {}
          for root,dirs,files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in {'.git','__pycache__','node_modules'}]
              for f in files:
                  ext = f.rsplit('.',1)[-1] if '.' in f else ''
                  if ext not in ('py','yml','pact','ts','html'): continue
                  try:
                      lines = len(open(os.path.join(root,f)).readlines())
                      totals[ext] = totals.get(ext,{'f':0,'l':0})
                      totals[ext]['f']+=1; totals[ext]['l']+=lines
                  except: pass
          for ext in sorted(totals): print(f'{ext}: {totals[ext][\"f\"]} files, {totals[ext][\"l\"]} lines')
          "

  nightly-summary:
    name: 🌙 Nightly Summary
    runs-on: ubuntu-latest
    needs: [drift-detection, nightly-benchmark, fuzz-testing, code-quality]
    if: always()
    steps:
      - name: Write summary
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "## 🌙 Nightly Quality — ${DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Drift Detection | ${{ needs.drift-detection.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ${{ needs.nightly-benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fuzz Testing | ${{ needs.fuzz-testing.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if drift
        if: needs.drift-detection.result == 'failure'
        run: echo "Regression drift detected" && exit 1
