name: 🔐 Security Agent

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── Job 1: Contract scan ──────────────────────────────────────────
  contract-scan:
    name: 🛡️ Scan Pact Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Scan all contracts — CLI report
        run: |
          echo "=== Contract Scan Results ===" >> $GITHUB_STEP_SUMMARY
          python cli.py --dir tests/contracts --no-ai --no-color \
            | head -40 | tee /tmp/scan-cli.txt
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "Grade|Score|Findings|F-|A\+" /tmp/scan-cli.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Scan contracts — JSON
        run: |
          python cli.py --dir tests/contracts --no-ai --format json --no-color \
            -o /tmp/scan-results.json || true
          python3 -c "
          import json
          with open('/tmp/scan-results.json') as f: data = json.load(f)
          reports = data if isinstance(data, list) else [data]
          for r in reports:
              rs = r['risk_score']
              bd = rs['breakdown']
              print(f'  {r[\"analyzed_file\"]}: {rs[\"letter_grade\"]} ({len(r[\"findings\"])} findings, crit={bd[\"critical\"]})')
          "

      - name: Scan contracts — SARIF
        run: |
          python cli.py --dir tests/contracts --no-ai --format sarif --no-color \
            -o results.sarif
          python3 -c "
          import json
          d = json.load(open('results.sarif'))
          total = sum(len(r['results']) for r in d['runs'])
          print(f'SARIF: {d[\"version\"]} | {len(d[\"runs\"])} run(s) | {total} result(s)')
          "

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true       # Code Scanning may not be enabled on all repos
        with:
          sarif_file: results.sarif
          category: pact-sentinel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-${{ github.run_number }}
          path: |
            /tmp/scan-results.json
            results.sarif
          retention-days: 90

  # ── Job 2: Python SAST ────────────────────────────────────────────
  python-sast:
    name: 🐍 Python SAST (Bandit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r src/ cli.py web_app.py \
            -f json -o /tmp/bandit.json \
            --skip B101,B603,B607 \
            -ll || true

          python3 -c "
          import json
          try:
              with open('/tmp/bandit.json') as f: data = json.load(f)
              results = data.get('results', [])
              by_sev = {}
              for r in results:
                  s = r.get('issue_severity','?')
                  by_sev[s] = by_sev.get(s,0) + 1
              print(f'Bandit: {len(results)} issues — {by_sev}')
              highs = by_sev.get('HIGH',0)
              if highs > 0: print(f'WARNING: {highs} HIGH severity issues (review manually)')
              else: print('No HIGH severity SAST issues')
          except Exception as e: print(f'Bandit parse error: {e}')
          "

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report-${{ github.run_number }}
          path: /tmp/bandit.json
          retention-days: 30

  # ── Job 3: Dependency audit ───────────────────────────────────────
  dependency-audit:
    name: 📦 Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install pip-audit
        run: pip install pip-audit
        continue-on-error: true

      - name: Run pip-audit
        run: |
          pip-audit --format json -o /tmp/audit.json 2>/dev/null || true
          python3 -c "
          import json, os
          try:
              if not os.path.exists('/tmp/audit.json'):
                  print('pip-audit did not produce output')
              else:
                  with open('/tmp/audit.json') as f: data = json.load(f)
                  deps = data.get('dependencies', [])
                  vulns = [d for d in deps if d.get('vulns')]
                  if vulns:
                      for pkg in vulns:
                          for v in pkg.get('vulns',[]):
                              print(f'  VULN: {pkg[\"name\"]} — {v.get(\"id\")}')
                  else: print(f'No known vulnerabilities in {len(deps)} packages')
          except Exception as e: print(f'Audit parse: {e}')
          "
        continue-on-error: true

      - name: Verify zero-dependency core
        run: |
          python3 -c "
          import sys; sys.path.insert(0,'.')
          from src.core.analyzer import PactSentinel
          s = PactSentinel(use_ai=False)
          r = s.analyze_source('(module m (quote a) (defun f () true))')
          print(f'Zero-dep core: OK (grade={r.risk_score.letter_grade})')
          "

  # ── Job 4: Secret scan ────────────────────────────────────────────
  secret-scan:
    name: 🔑 Secret Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Scan for accidental secrets
        run: |
          python3 -c "
          import re, subprocess, sys
          PATTERNS = [
              (r'AKIA[0-9A-Z]{16}',            'AWS Access Key'),
              (r'-----BEGIN.*PRIVATE KEY-----', 'Private Key'),
          ]
          issues = []
          for pattern, label in PATTERNS:
              result = subprocess.run(['git','log','-p','--all','--','*.py','*.yml'],
                  capture_output=True, text=True, timeout=30)
              if re.search(pattern, result.stdout):
                  issues.append(f'{label}: found in git history')
          if issues:
              for i in issues: print(f'WARNING: {i}')
          else: print('No secrets detected in git history')
          "
        continue-on-error: true

  # ── Job 5: Security summary ───────────────────────────────────────
  security-summary:
    name: 🔐 Security Summary
    runs-on: ubuntu-latest
    needs: [contract-scan, python-sast, dependency-audit, secret-scan]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 🔐 Security Agent Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Contract SARIF Scan | ${{ needs.contract-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python SAST (Bandit) | ${{ needs.python-sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if contract scan failed
        if: needs.contract-scan.result == 'failure'
        run: echo "Contract scan failed" && exit 1
