### 📄 Documentation

- [GitHub Pages Site](https://sunilblinkoninfra-cyber.github.io/pact-sentinel)
- [README](README.md)
- [CHANGELOG](CHANGELOG.md)
- [Contributing Guide](CONTRIBUTING.md)

---
*Built for the Kadena Pact Security Competition.*" \
            --latest \
            && echo "✅ Release v1.0.0 created"

  # ── Job 3: Run security scan on test contract ─────────────────────
  verify-scanner:
    name: Verify Scanner Works
    runs-on: ubuntu-latest
    needs: configure-repo
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run test suite
        run: python -m pytest tests/test_sentinel.py -v --tb=short

      - name: Analyze vulnerable contract
        run: |
          python cli.py tests/contracts/vulnerable-defi.pact \
            --no-ai --format json -o /tmp/vuln-report.json
          python3 -c "
          import json
          r = json.load(open('/tmp/vuln-report.json'))
          rs = r['risk_score']
          print(f'Grade: {rs[\"letter_grade\"]}  Score: {rs[\"security_score\"]}/100')
          print(f'Findings: {rs[\"breakdown\"]}')
          assert len(r['findings']) >= 10, 'Expected 10+ findings'
          assert rs['letter_grade'] in ('F', 'F-'), 'Expected F grade'
          print('✅ Scanner verified — detected all vulnerabilities')
          "

      - name: Analyze safe contract
        run: |
          python cli.py tests/contracts/safe-token.pact \
            --no-ai --format json -o /tmp/safe-report.json
          python3 -c "
          import json
          r = json.load(open('/tmp/safe-report.json'))
          rs = r['risk_score']
          print(f'Grade: {rs[\"letter_grade\"]}  Score: {rs[\"security_score\"]}/100')
          critical = [f for f in r['findings'] if f['severity'] == 'critical']
          assert len(critical) == 0, f'Safe contract should have 0 critical findings, got {len(critical)}'
          print('✅ Safe contract verified — no critical findings')
          "

      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-reports
          path: /tmp/*-report.json

      - name: Post summary
        run: |
          python cli.py tests/contracts/vulnerable-defi.pact \
            --no-ai --format markdown >> $GITHUB_STEP_SUMMARY
