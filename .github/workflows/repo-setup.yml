name: 🚀 Repository Setup & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Job 1: Configure repo metadata ────────────────────────────────
  configure-repo:
    name: Set Description, Topics & Pages
    runs-on: ubuntu-latest
    steps:
      - name: Set repository description and topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            /repos/${{ github.repository }} \
            -f description="🛡️ AI-powered security analyzer for Kadena Pact smart contracts — static analysis + Claude AI + risk scoring" \
            -f homepage="https://sunilblinkoninfra-cyber.github.io/pact-sentinel" \
            -f has_issues=true \
            -f has_wiki=false \
            -f has_projects=false \
            --silent && echo "✅ Description updated"

      - name: Set repository topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PUT \
            /repos/${{ github.repository }}/topics \
            -f 'names[]=pact' \
            -f 'names[]=kadena' \
            -f 'names[]=blockchain' \
            -f 'names[]=security' \
            -f 'names[]=smart-contracts' \
            -f 'names[]=static-analysis' \
            -f 'names[]=vulnerability-scanner' \
            -f 'names[]=defi' \
            -f 'names[]=cli-tool' \
            --silent && echo "✅ Topics set: pact kadena blockchain security smart-contracts static-analysis vulnerability-scanner defi cli-tool"

      - name: Enable GitHub Pages from /docs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST \
            /repos/${{ github.repository }}/pages \
            -f build_type=legacy \
            -f source='{"branch":"main","path":"/docs"}' \
            --silent 2>/dev/null \
          || gh api --method PUT \
            /repos/${{ github.repository }}/pages \
            -f build_type=legacy \
            -f source='{"branch":"main","path":"/docs"}' \
            --silent 2>/dev/null \
          || echo "ℹ️  Pages already configured or needs manual enable"
          echo "✅ GitHub Pages configured → /docs"

  # ── Job 2: Create GitHub Release ─────────────────────────────────
  create-release:
    name: Create v1.0.0 Release
    runs-on: ubuntu-latest
    needs: configure-repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release from v1.0.0 tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if release already exists
          if gh release view v1.0.0 --repo ${{ github.repository }} &>/dev/null; then
            echo "ℹ️  Release v1.0.0 already exists"
            exit 0
          fi

          gh release create v1.0.0 \
            --repo ${{ github.repository }} \
            --title "🛡️ Pact Sentinel v1.0.0 — Competition Release" \
            --notes "## 🛡️ Pact Sentinel v1.0.0

AI-powered security analyzer for Kadena Pact smart contracts.

### ✨ Highlights

- **12 detection rules** covering the full Pact vulnerability surface
- **Recursive descent parser** — real AST, not regex matching
- **Claude AI integration** — deep explanations, attack scenarios, auto-fix suggestions
- **Risk scoring** — A+ to F- letter grades with compound multipliers
- **Zero mandatory dependencies** — pure Python 3.9+ stdlib
- **4 output formats** — CLI, JSON, Markdown, SARIF 2.1
- **CI/CD ready** — GitHub Actions workflow with SARIF upload
- **39 unit tests** — all passing

### 📊 Test Results

| Contract | Findings | Grade | Score |
|----------|----------|-------|-------|
| \`vulnerable-defi.pact\` | 22 | **F-** | 0.0/100 |
| \`safe-token.pact\` | 0 | **A+** | 100/100 |

### 🚀 Quick Start

\`\`\`bash
git clone https://github.com/sunilblinkoninfra-cyber/pact-sentinel.git
cd pact-sentinel
python cli.py tests/contracts/vulnerable-defi.pact --no-ai
\`\`\`

### 🔍 Vulnerability Coverage

| Rule | Severity | Description |
|------|----------|-------------|
| R-001 | 🔴 CRITICAL | State mutation without capability guard |
| R-002 | 🟡 MEDIUM | Overly broad capability scope |
| R-003 | 🟠 HIGH | Hardcoded admin keyset reference |
| R-004 | 🟠 HIGH | Public function modifies sensitive state |
| R-005 | 🔴 CRITICAL | Capability missing authorization enforcement |
| R-006 | 🟠 HIGH | CEI violation (state change before auth) |
| R-007 | 🔴 CRITICAL | Unguarded administrative function |
| R-008 | 🟠 HIGH | Unsafe defpact multi-step logic |
| R-009 | 🟠 HIGH | Weak or bypassable guard construction |
| R-010 | 🟡 MEDIUM | Unprotected table initialization |
| R-011 | 🟡 MEDIUM | Capability composition re-entrancy |
| R-012 | 🟠 HIGH | Transfer capability missing \`@managed\` |

### 📁 Repository Structure

\`\`\`
pact-sentinel/
├── cli.py                   # CLI entry point
├── web_app.py               # Flask web server
├── src/
